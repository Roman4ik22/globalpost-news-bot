name: Daily GlobalPost News

on:
  schedule:
    # 13:00 UTC = 15:00 Kyiv (зима UTC+2) / 16:00 (лето UTC+3)
    - cron: "0 13 * * *"  # Каждый день 15:00 Kyiv
  workflow_dispatch: # Ручной запуск

jobs:
  post-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python bot.py

      - name: Save history
        run: |
          git config user.name "GlobalPost Bot"
          git config user.email "bot@globalpost.ua"
          git add history.json
          git diff --staged --quiet || git commit -m "Update publish history [skip ci]"
          git push
